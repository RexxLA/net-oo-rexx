; 2007-02-09, 2007-04-03, ---rgf
;             - entries are strings in the form: key=value
;               attention: case of key is irrelevant (as in Rexx everything gets translated to uppercase)
;
;             - empty lines or lines starting with ';' or '#' are ignored


# ---------------------- global settings (defining default configuration)

;       --- default .false (0): if set to .true (1), then ".Log"'s 'log' method executes
;           asynchroneously, hence returning control to calling programs earlier, but loosing
;           synchronicity with the execution of the calling program. Use only, if time-critical
;           applications employ logging
;
# log4rexx.config.asyncMode=0


;       --- determine interval in second(s) for checking whether configuration file has changed
;
# log4rexx.config.configFileWatchInterval=5.000000


;       --- default .true (1): if set to .false (0), then config.disable is honored
# log4rexx.config.disableOverride=0


;       --- if "config.LogFactory.disableOverride" is .false (0), then disable *all* logging
;           (for all log instances!) for messageLogLevel <= config.LogFactory.disable
;
# log4rexx.config.disable=info


; -------- configuration attribute that determines which Log class to use, e.g. the default log
;          implementations NoOpLog, SimpleLog, Log (standard implementation, which can do
;          everything we need); alternatively the name of a Log class (a subclass of "Log")
;          defined in a Rexx file by the same name (e.g. "MyLog" would be implemented in a
;          file "MyLog.rex")
;
;  used by LogManager to determine which Log class to use for logging, one of
;  "Log", "SimpleLog", "NoOpLog"
log4rexx.config.LoggerFactoryClassName = Log


;       --- default .false (0): if set to .true (1), then .LogLog will output log messages
;           at level 'debug' (levels 'warn' and 'error' will always be output, unless the
;           option 'quietMode' is set to .true (1);
;           these options allow debug information from the 'log4rexx' framework itself
; log4rexx.config.LogLog.debug=1
log4rexx.config.LogLog.debug=0


;       --- default .false (0): if set to .true (1), then the .LogLog class will not even
;           output warn and error messages
# log4rexx.config.LogLog.quietMode=0



# ---------------------- configure "rootLogger"
# default log level is "info"
log4rexx.logger.rootLogger = info, dest1_def, dest2_ok


# ----------------------- configure "SimpleLog": only relevant, if "LoggerFactoryClassName" is 'SimpleLog'
# log4rexx.config.SimpleLog

; 'showDateTime', values: 1 (.true/show), 0 (.false/do not show, default)
log4rexx.config.SimpleLog.showDateTime = 0

; 'showLoggerName', values: 1 (.true/show, default), 0 (.false/do not show, default)
log4rexx.config.SimpleLog.showLoggerName = 0

; 'showShortName', values: 1 (.true/show), 0 (.false/do not show, default)
log4rexx.config.SimpleLog.showShortName = 0

; 'logLevel' defaults to "WARN", values: TRACE < DEBUG < INFO < WARN < ERROR < FATAL < NOLOGGING
; logLevel = INFO
log4rexx.config.SimpleLog.logLevel = INFO




; =================== Appenders =================================================
;


;
; "NullAppender": does nothing, has no options


; Options of "ConsoleAppender"
;
;       --- appender does not log messages with a logLevel smaller than Threshold (default:
;           append any log message)
#       threshold=logLevel ... log messages lower than logLevel are ignored
;
;       --- comma separated list of filters
;
#       filter=

;
;       --- allow re-directing standard output file
;       --- .true (1, default), .false (0)
#       follow=1
;
;       --- console file, either {stdout|output} (default) or {stderr|error}
#       target=stdout
;
;       --- .true (1, default), .false (0)
#       immediateFlush=true

log4rexx.appender.dest1_def = ConsoleAppender

log4rexx.appender.dest2_ok = ConsoleAppender
log4rexx.appender.dest2_ok.Threshold=warn
log4rexx.appender.dest2_ok.filter   =filt1,filt2  ,  filt3
log4rexx.appender.dest2_ok.ImmediateFlush=0
log4rexx.appender.dest2_ok.Target=stdout
log4rexx.appender.dest2_ok.follow=false

log4rexx.appender.dest3_err = ConsoleAppender
log4rexx.appender.dest3_err.Threshold=nixi
log4rexx.appender.dest3_err.filter   =nixiNoxi
log4rexx.appender.dest3_err.ImmediateFlush=99
log4rexx.appender.dest3_err.Target=wonderfulWorld
log4rexx.appender.dest3_err.follow=hoopsie

log4rexx.appender.dest3b_err = ConsoleAppender
log4rexx.appender.dest3b_err.Threshold=
log4rexx.appender.dest3b_err.ImmediateFlush
log4rexx.appender.dest3b_err.filter   =
log4rexx.appender.dest3b_err.Target=
log4rexx.appender.dest3b_err.follow=




; Options of "FileAppender", a subclass of "Appender", hence its options are available as well
;
;       --- appender does not log messages with a logLevel smaller than Threshold (default:
;           append any log message)
#       threshold=logLevel ... log messages lower than logLevel are ignored
;
;       --- comma separated list of filters
;
#       filter=
;
;       --- console file: any file-name: in log4j named 'file'
#       fileName=
;
;       --- .true (1, default), .false (0): in log4j named 'append'
#       fileAppend=1
;
;       --- buffer log messages: .true (1), .false (0, default)
#       bufferedIO=0
;

log4rexx.appender.dest4_def = FileAppender

log4rexx.appender.dest4_ok  = FileAppender
log4rexx.appender.dest4_ok.Threshold   = warn
log4rexx.appender.dest4_ok.filter      = filt1,filt2  ,  filt3
log4rexx.appender.dest4_ok.fileName    = test4fileAppender.log
log4rexx.appender.dest4_ok.fileAppend  = .false
log4rexx.appender.dest4_ok.bufferedIO  = .true

log4rexx.appender.dest4_err            = FileAppender
log4rexx.appender.dest4_err.Threshold  = nixi
log4rexx.appender.dest4_err.filter     = nixiNoxi
log4rexx.appender.dest4_err.fileName   = ocha, dackel!
log4rexx.appender.dest4_err.fileAppend = notAlogical
log4rexx.appender.dest4_err.bufferedIO = another not a logical

log4rexx.appender.dest4b_err            = FileAppender
log4rexx.appender.dest4b_err.Threshold  =
log4rexx.appender.dest4b_err.filter     =
log4rexx.appender.dest4b_err.fileName   =
log4rexx.appender.dest4b_err.fileAppend =
log4rexx.appender.dest4b_err.bufferedIO =



; Options of "RollingFileAppender", a subclass of "FileAppender", hence its options are available as well
;
;
;       --- appender does not log messages with a logLevel smaller than Threshold (default:
;           append any log message)
#       threshold=logLevel ... log messages lower than logLevel are ignored
;
;       --- comma separated list of filters
;
#       filter=
;
;       --- console file: any file-name: in log4j named 'file'
#       fileName=
;
;       --- .true (1, default), .false (0): in log4j named 'append'
#       fileAppend=1
;
;       --- buffer log messages: .true (1), .false (0, default)
#       bufferedIO=0
;
;       --- integer number, optionally followed by K[B], M[B], G[B], T[B]
#       MaxFileSize=100KB
;
;       --- 0 (=no backup file) or higher, determines number of backup files
#       MaxBackupIndex=2



; Options of "DailyRollingFileAppender", a subclass of "FileAppender", hence that options are available as well
;
;
;       --- appender does not log messages with a logLevel smaller than Threshold (default:
;           append any log message)
#       threshold=logLevel ... log messages lower than logLevel are ignored
;
;       --- comma separated list of filters
;
#       filter=
;
;       --- console file: any file-name: in log4j named 'file'
#       fileName=
;
;       --- .true (1, default), .false (0): in log4j named 'append'
#       fileAppend=1
;
;       --- buffer log messages: .true (1), .false (0, default)
#       bufferedIO=0
;
;       --- rollType: "MI[NUTE]", "HO[UR]", "HA[LF_DAY]", "D[AY]" (default), "W[EEK]", "MO[NTH]"
#       rollType=DAY
;



; Options of "TelnetAppender"
;
;       --- appender does not log messages with a logLevel smaller than Threshold (default:
;           append any log message)
#       threshold=logLevel ... log messages lower than logLevel are ignored
;
;       --- comma separated list of filters
;
#       filter=
;
;       --- .true (1), .false (0, default): determines whether telnet clients should be closed, if
;                                           server socket gets closed (e.g. switching server port)
#       keepClients=0
;
;       --- server port number; default: 23 (well defined port for telnet); should be otherwise>1024
#       port=23
;
;       --- determine number of logs to show (default: 25), if new client attaches to server
;       maxLogsInQueue=25



; =================== Layouts ============================================================
;
; 'SimpleLayout': nothing to configure
;

log4rexx.layout.01_simple = SimpleLayout

log4rexx.layout.01_simple_ok = SimpleLayout
log4rexx.layout.01_simple_ok.header      = This is the RGF-header
log4rexx.layout.01_simple_ok.footer      = This is the RGF-footer
log4rexx.layout.01_simple_ok.contentType = text/blain


; Options of 'PatternLayout'
;
;   flag:
;      c    Category     -- (dotted) logger name, "Category" is the original name for "Logger"
;                        -- %c{1} ... last component of dotted name
;                        -- %c{2} ... last two components of dotted name
;      C    ClassName    -- future?
;      d    DateTime     -- DateTime (using Rexx BIFs) in the form of: DATE("S",,,"-") TIME("L")
;                        -- %d{D[date.option[separatorChar]]}
;                        --        date.option one of: "BDELMNOSUW"
;                        --        separatorChar: any single character, if date.option is one of "ENOSU"
;                        --        e.g.: %d{D} %d{DS} %d{DE.}
;                        -- %d{T[time.option]}
;                        --        time.option one of: "CEHLMNR"
;                        --        e.g.: %d{T} %d{TC}
;
;      f    FieldName    -- log4rexx-ONLY: meant for XMLLayout: determines field name of following field
;                        -- e.g. %f{LoggingNumberOrLineNumber}#%L:
;
;      F    FileName     -- future?
;      L    LineNumber   -- future?
;      M    MethodName   -- future?
;      m    Message      -- message
;      N    LogNr        -- "LogNumber"
;      p    LogLevel     -- "priority"
;      r    Elapsed      -- needs to be formatted with "formatElapsedSeconds()"
;      R    Elapsed      -- needs to be formatted with "formatElapsedWithDays()"
;      t    ThreadName   -- future?
;      a    Additional   -- log4rexx-ONLY: optional, second argument in log-message, third argument in
;                                       the case that 2nd argument is a condition object
;
;      n                 -- new line, e.g. %n
;      %                 -- escape char for '%', e.g. %%
;
;      Between % and flag: [-][min][.max]
;
;               "-" ... left justify within width of field (by default: right justification)
;               min ... minimum width, field may be larger
;               max ... maximum width, field will get truncated, if necessary
;
;
;       --- default:
#       conversionPattern=%5N: %r [%c] %-5p - %m%n

log4rexx.layout.02_pattern = patternLayout

log4rexx.layout.02_pattern_ok = patternLayout
log4rexx.layout.02_pattern_ok.header            = This is the RGF-header
log4rexx.layout.02_pattern_ok.footer            = This is the RGF-footer
log4rexx.layout.02_pattern_ok.contentType       = text/blain
log4rexx.layout.02_pattern_ok.conversionPattern = %N %r %c %p %m %n



; Options of "XMLLayout", a subclass of "PatternLayout", hence that options are available as well
;
;      -- optional "processInstruction", e.g.:
#      processInstruction=<?xml version="1.0" encoding="UTF-8"?> <?xml-stylesheet type="text/css" href="myStyleSheet.css"?> <?xml-stylesheet type="text/xsl" href="myTransform.xslt"?>


log4rexx.layout.03_xml = XmlLayout

log4rexx.layout.03_xml_ok = XmlLayout
log4rexx.layout.03_xml_ok.header             = This is the RGF-header
log4rexx.layout.03_xml_ok.footer             = This is the RGF-footer
log4rexx.layout.03_xml_ok.contentType        = text/iksml
log4rexx.layout.03_xml_ok.conversionPattern  = %N %r %c %p %m %n
log4rexx.layout.03_xml_ok.processInstruction = <? a RGF PI ?>



; Options of "HTMLLayout", a subclass of "PatternLayout", hence that options are available as well
;
;       --- optional title
#       title=
;
;       --- .true (1, default), .false (0)
#       useStyleSheet=1
;
;       --- optional name of a style sheet file to use, by default empty (will create embedded style definitions)
;       styleSheetName=


log4rexx.layout.04_html = HtmlLayout

log4rexx.layout.04_html_ok = HtmlLayout
log4rexx.layout.04_html_ok.header             = This is the RGF-header
log4rexx.layout.04_html_ok.footer             = This is the RGF-footer
log4rexx.layout.04_html_ok.contentType        = text/hdml
log4rexx.layout.04_html_ok.conversionPattern  = %N %r %c %p %m %n
log4rexx.layout.04_html_ok.title              = The RGF Title
log4rexx.layout.04_html_ok.useStyleSheet      = false
log4rexx.layout.04_html_ok.styleSheetName     = RGFStyleSheet.css

log4rexx.layout.04b_html_ok = HtmlLayout
log4rexx.layout.04b_html_ok.header             = This is the RGF-header
log4rexx.layout.04b_html_ok.footer             = This is the RGF-footer
log4rexx.layout.04b_html_ok.contentType        = text/hdml
log4rexx.layout.04b_html_ok.conversionPattern  = %N %r %c %p %m %n
log4rexx.layout.04b_html_ok.title              = The RGF Title
log4rexx.layout.04b_html_ok.useStyleSheet      = .true
log4rexx.layout.04b_html_ok.styleSheetName     = RGFStyleSheet.css

log4rexx.layout.04b_html_nok = HtmlLayout
log4rexx.layout.04b_html_nok.header             = RGF-header
log4rexx.layout.04b_html_nok.footer             = the RGF-footer
log4rexx.layout.04b_html_nok.contentType        = dexd/hdml
log4rexx.layout.04b_html_nok.conversionPattern  = nixiNoxi
log4rexx.layout.04b_html_nok.title              = RGF-Title
log4rexx.layout.04b_html_nok.useStyleSheet      = nixiNoxiNixi
log4rexx.layout.04b_html_nok.styleSheetName     = RGFStyleSheet.css




; =================== Filters (named entitities in 'log4rexx') ==============================
; Filters may be used by appenders and have a method "decide" which returns one of:
;       deny (0)        ... do not log message
;       accept (1)      ... do log message
;       neutral (2)     ... not decided yet, let next filter decide; if last filter, then log message
;
; Each filter has an attribute 'acceptOnMatch' which determines how to regard a match;
; .true (1) means accept, .false (0) means do not accept; however, some filters may apply
; additional semantics and based upon them return one of "deny", "accept", or "neutral"
;

; Options of "Filter"
;       root of all filters, method 'decide' will always return "neutral"
;       --- .true (1, default), .false (0)
#       acceptOnMatch=1


; Options of "DenyAllFilter" a subclass of "Filter" (cf. 'log4j')
;       root of all filters, method 'decide' will always return "deny"

log4rexx.filter.filt1 = DenyAllFilter


; Options of "LevelMatchFilter" a subclass of "Filter" (cf. 'log4j')
;       if 'logLevelToMatch' does not match, returns "neutral",
;       if 'logLevelToMatch' does match, then if 'acceptOnMatch' is .true, returns "accept",
;                                        else returns "deny"
;
;       --- one of "TRACE", "DEBUG", "INFO", "WARN", "ERROR", "FATAL"
#       logLevelToMatch=DEBUG

log4rexx.filter.filt2_def             = levelMatchFilter

log4rexx.filter.filt2                 = levelMatchFilter
log4rexx.filter.filt2.acceptOnMatch   = 0
log4rexx.filter.filt2.logLevelToMatch = WARN

log4rexx.filter.filt2_err                 = levelMatchFilter
log4rexx.filter.filt2_err.acceptOnMatch   = no, so was
log4rexx.filter.filt2_err.logLevelToMatch = nixNoxi

log4rexx.filter.filt2b_err                 = levelMatchFilter
log4rexx.filter.filt2b_err.acceptOnMatch   =
log4rexx.filter.filt2b_err.logLevelToMatch =



; Options of "LevelRangeFilter" a subclass of "Filter" (cf. 'log4j')
;       if logLevel is beyond range returns "deny",
;       else if 'acceptOnMatch' is .true, returns "accept", else returns "neutral" (!)
;
;       --- one of "TRACE", "DEBUG", "INFO", "WARN", "ERROR", "FATAL"
#       logLevelMin=TRACE
#       logLevelMax=FATAL

log4rexx.filter.filt3_def                  = levelRangeFilter

log4rexx.filter.filt3                      = levelRangeFilter
log4rexx.filter.filt3.acceptOnMatch        = .false
log4rexx.filter.filt3.logLevelMin          = INFO
log4rexx.filter.filt3.logLevelMax          = error

log4rexx.filter.filt3_err                  = levelRangeFilter
log4rexx.filter.filt3_err.acceptOnMatch    = nixi
log4rexx.filter.filt3_err.logLevelMin      = noix
log4rexx.filter.filt3_err.logLevelMax      = xion

log4rexx.filter.filt3b_err                 = levelRangeFilter
log4rexx.filter.filt3b_err.acceptOnMatch   =
log4rexx.filter.filt3b_err.logLevelMin     =
log4rexx.filter.filt3b_err.logLevelMax     =




; Options of "StringMatchFilter" a subclass of "Filter" (cf. 'log4j')
;       if empty 'stringToMatch' or no match, returns "neutral"
;       else if 'acceptOnMatch' is .true, returns "accept", else returns "deny"
;
;       --- any string; attention: honors any leading and trailing blanks after equal sign
#       stringToMatch=
;
;       --- .true (1), .false (0, default)
#       ignoreCase=0

log4rexx.filter.filt4_def                  = stringMatchFilter

log4rexx.filter.filt4                      = stringMatchFilter
log4rexx.filter.filt4.acceptOnMatch        = .false
log4rexx.filter.filt4.stringToMatch        =no, leading, no trailing blanks!
log4rexx.filter.filt4.ignoreCase           = true

log4rexx.filter.filt4_err                  = stringMatchFilter
log4rexx.filter.filt4_err.acceptOnMatch    = nixi
log4rexx.filter.filt4_err.stringToMatch    =
log4rexx.filter.filt4_err.ignoreCase       = xion

log4rexx.filter.filt4b_err                 = stringMatchFilter
log4rexx.filter.filt4b_err.acceptOnMatch
log4rexx.filter.filt4b_err.stringToMatch
log4rexx.filter.filt4b_err.ignoreCase



; Options of "DateRangeFilter" a subclass of "Filter" (cf. 'log4j')
;       - if current date outside of given date range and acceptOnMatch=.true: "deny"
;       - if current date within given date range and acceptOnMatch=.false: "deny"
;       - "neutral" else
;
;       --- dates in sorted format, ie. YYYYMMDD, where YYYY is the four-digit year,
;           "MM" is the two-digit month, "DD" is the two-digit day
#       dateMin=00010101
#       dateMax=99991231

log4rexx.filter.filt5_def                  = dateRangeFilter

log4rexx.filter.filt5                      = dateRangeFilter
log4rexx.filter.filt5.acceptOnMatch        = .false
log4rexx.filter.filt5.dateMin              =  20070407
log4rexx.filter.filt5.dateMax              =  20080406

log4rexx.filter.filt5_err                  = dateRangeFilter
log4rexx.filter.filt5_err.acceptOnMatch    = nixi
log4rexx.filter.filt5_err.dateMin          =
log4rexx.filter.filt5_err.dateMax          = xion

log4rexx.filter.filt5b_err                 = dateRangeFilter
log4rexx.filter.filt5b_err.acceptOnMatch
log4rexx.filter.filt5b_err.dateMin
log4rexx.filter.filt5b_err.dateMax


; Options of "TimeRangeFilter" a subclass of "Filter" (cf. 'log4j')
